<script>
  (function () {
    const switchers = document.querySelectorAll('.lang-switcher')
    const LABELS = { en: 'EN', fr: 'FR', de: 'DE', 'zh-hans': '中文' }
    const LOCALE_PATHS = { en: '', fr: '/fr', de: '/de', 'zh-hans': '/zh-hans' }
    switchers.forEach(function (sw) {
      const currentLocale = sw.dataset.currentLocale || 'en'
      const pagePath = sw.dataset.currentPath || '/'
      const labelEl = sw.querySelector('.lang-switcher__current')
      const dropdown = sw.querySelector('.lang-switcher__dropdown')
      if (labelEl) labelEl.textContent = LABELS[currentLocale] || 'EN'
      sw.querySelectorAll('[data-locale]').forEach(function (opt) {
        const locale = opt.dataset.locale
        opt.href = LOCALE_PATHS[locale] + pagePath
        if (locale === currentLocale) opt.classList.add('lang-switcher__option--active')
      })
      sw.addEventListener('click', function (e) {
        e.stopPropagation()
        dropdown.classList.toggle('lang-switcher__dropdown--open')
      })
    })
    document.addEventListener('click', function () {
      document.querySelectorAll('.lang-switcher__dropdown--open').forEach(function (d) {
        d.classList.remove('lang-switcher__dropdown--open')
      })
    })
  })()
</script>
