<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="contact.page-title">Contact — Cubewise</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

{{header}}

<main>
  <section class="component-hero component-hero--dark">
    <div class="component-label" data-i18n="contact.hero-label">Contact</div>
    <h1 data-i18n="contact.hero-heading">Get in touch</h1>
    <p data-i18n="contact.hero-body">We would love to hear from you</p>
  </section>

  <form class="contact-form" action="https://formspree.io/f/PLACEHOLDER" method="POST">

    <div class="name-row">
      <div>
        <label for="first-name" data-i18n="contact.label-first-name">First name <span aria-hidden="true" style="color:var(--orange-gold)">*</span></label>
        <input type="text" id="first-name" name="first-name" required="" autocomplete="given-name">
      </div>
      <div>
        <label for="last-name" data-i18n="contact.label-last-name">Last name <span aria-hidden="true" style="color:var(--orange-gold)">*</span></label>
        <input type="text" id="last-name" name="last-name" required="" autocomplete="family-name">
      </div>
    </div>

    <div>
      <label for="email" data-i18n="contact.label-email">Email <span aria-hidden="true" style="color:var(--orange-gold)">*</span></label>
      <input type="email" id="email" name="email" required="" autocomplete="email">
    </div>

    <div>
      <label for="region" data-i18n="contact.label-region">Region <span aria-hidden="true" style="color:var(--orange-gold)">*</span></label>
      <select id="region" name="region" required="">
        <option value="" disabled="" selected="" data-i18n="contact.option-region-default">Select your region…</option>
        <option data-i18n="contact.option-africa">Africa</option>
        <option data-i18n="contact.option-australia-nsw">Australia (NSW &amp; Queensland)</option>
        <option data-i18n="contact.option-australia-vic">Australia (Victoria, SA, WA)</option>
        <option data-i18n="contact.option-austria">Austria</option>
        <option data-i18n="contact.option-benelux">Belgium, Netherlands</option>
        <option data-i18n="contact.option-canada">Canada</option>
        <option data-i18n="contact.option-france">France</option>
        <option data-i18n="contact.option-germany">Germany</option>
        <option data-i18n="contact.option-hong-kong">Hong Kong</option>
        <option data-i18n="contact.option-india">India</option>
        <option data-i18n="contact.option-china">People's Republic of China</option>
        <option data-i18n="contact.option-poland">Poland</option>
        <option data-i18n="contact.option-singapore">Singapore</option>
        <option data-i18n="contact.option-switzerland">Switzerland</option>
        <option data-i18n="contact.option-taiwan">Taiwan</option>
        <option data-i18n="contact.option-ukraine">Ukraine</option>
        <option data-i18n="contact.option-uk">United Kingdom</option>
        <option data-i18n="contact.option-us-east">United States - East</option>
        <option data-i18n="contact.option-us-central">United States - Central</option>
        <option data-i18n="contact.option-us-west">United States - West</option>
        <option data-i18n="contact.option-other">Other</option>
      </select>
    </div>

    <div>
      <label data-i18n="contact.label-discuss">What would you like to discuss?</label>
      <div class="product-pills">
        <label><input type="checkbox" name="interest" value="Arc"><span class="pill-label">Arc</span></label>
        <label><input type="checkbox" name="interest" value="Arc+"><span class="pill-label">Arc+</span></label>
        <label><input type="checkbox" name="interest" value="Atmosphere"><span class="pill-label">Atmosphere</span></label>
        <label><input type="checkbox" name="interest" value="PowerConnect"><span class="pill-label">PowerConnect</span></label>
        <label><input type="checkbox" name="interest" value="Pulse"><span class="pill-label">Pulse</span></label>
        <label><input type="checkbox" name="interest" value="Slice"><span class="pill-label">Slice</span></label>
        <label><input type="checkbox" name="interest" value="TM1py"><span class="pill-label">TM1py</span></label>
        <label><input type="checkbox" name="interest" value="Other"><span class="pill-label" data-i18n="contact.pill-other">Other</span></label>
      </div>
    </div>

    <div>
      <label for="message" data-i18n="contact.label-message">Message <span style="font-size:0.85rem;font-weight:400;color:var(--charcoal)">(optional)</span></label>
      <textarea id="message" name="message"></textarea>
    </div>

    <div class="consent-block">
      <input type="checkbox" id="consent" name="consent" value="yes" required="">
      <label for="consent" style="font-weight:400;margin-bottom:0" data-i18n="contact.label-consent">We would like to reach you via email with the latest news and best practices in FP&amp;A and TM1 development — no more than once a month. <span aria-hidden="true" style="color:var(--orange-gold)">*</span></label>
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" data-i18n="contact.submit">Submit details</button>

  </form>

  <div class="contact-support-note" style="max-width:560px;margin:0 auto;padding-left:2rem;padding-right:2rem;padding-bottom:3rem">
    <span data-i18n="contact.support-note">Need technical support?</span> <a href="https://cubewisecare.atlassian.net/servicedesk/customer/portal/13" data-i18n="contact.support-link">Visit our support portal →</a>
  </div>
</main>

  {{footer}}
</body></html>
